<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Cluj → Adriatica — Jurnal de Călătorie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF; --bg-hover:#F1F1EF; --bg-callout-blue:#E7F3FE; --bg-callout-gray:#F1F1EF;
    --border:#E9E9E7;
    --text:#37352F; --text-light:#787774; --text-faint:#9B9A97;
    --blue:#2383E2; --red:#EB5757;
    --font:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
    --font-mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg); color:var(--text); font-family:var(--font); font-size:15px; line-height:1.55; min-height:100vh; -webkit-font-smoothing:antialiased;}
  button{font-family:inherit;}
  input,textarea{font-family:var(--font); font-size:15px;}
  a{color:var(--blue);}

  #boot{min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; text-align:center; padding:24px;}
  #boot .mark{font-size:20px; font-weight:700;}
  #boot .sub{color:var(--text-light); font-size:13px;}
  .spinner{width:22px;height:22px;border-radius:50%; border:2.5px solid var(--border); border-top-color:var(--blue); animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .pin-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .pin-card{max-width:360px; width:100%; text-align:center;}
  .pin-icon{font-size:40px; margin-bottom:14px;}
  .pin-card h1{font-size:19px; font-weight:700; margin:0 0 6px;}
  .pin-card p{color:var(--text-light); font-size:13.5px; margin:0 0 20px; line-height:1.5;}
  .pin-input{width:100%; padding:11px 14px; font-size:18px; letter-spacing:3px; text-align:center; border:none; border-bottom:2px solid var(--border); background:transparent; color:var(--text); font-family:var(--font-mono); margin-bottom:16px;}
  .pin-input:focus{outline:none; border-color:var(--blue);}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; border-radius:4px; padding:9px 16px; font-size:14px; font-weight:600; cursor:pointer; min-height:38px;}
  .btn-primary{background:var(--text); color:#fff; width:100%;}
  .btn-primary:hover{opacity:.88;}
  .btn-ghost{background:transparent; color:var(--text-light); border:1px solid var(--border);}
  .btn-danger{background:none; color:var(--red); border:1px solid var(--red);}
  .pin-error{color:var(--red); font-size:12.5px; margin:-8px 0 12px; min-height:16px;}
  .pin-note{font-size:11.5px; color:var(--text-faint); margin-top:16px;}

  #app{display:none;}
  .topbar{position:sticky; top:0; z-index:30; background:var(--bg); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; padding:9px 12px;}
  .hamburger{background:none; border:none; color:var(--text); font-size:19px; cursor:pointer; padding:4px 6px; min-height:34px;}
  .topbar .title{font-weight:600; font-size:14px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text-light);}
  .topbar .save-dot{width:6px;height:6px;border-radius:50%; background:#2F9E44; flex-shrink:0;}
  .topbar .save-dot.saving{background:#D9A116;}
  .shell{display:flex; min-height:calc(100vh - 46px);}

  .scrim{position:fixed; inset:0; background:rgba(15,15,15,.35); z-index:35; opacity:0; pointer-events:none; transition:opacity .2s;}
  .scrim.show{opacity:1; pointer-events:auto;}
  .sidebar{position:fixed; top:0; left:0; bottom:0; width:78%; max-width:260px; background:#FBFBFA; z-index:40; transform:translateX(-100%); transition:transform .2s; display:flex; flex-direction:column; border-right:1px solid var(--border); font-size:14px;}
  .sidebar.open{transform:translateX(0);}
  .sidebar-head{padding:14px 14px 8px; font-weight:700; font-size:13.5px; color:var(--text-light);}
  .nav-list{list-style:none; margin:0; padding:2px 8px; overflow-y:auto; flex:1;}
  .nav-item{display:flex; align-items:center; gap:7px; padding:5px 8px; border-radius:4px; cursor:pointer; color:var(--text-light); user-select:none;}
  .nav-item .ic{font-size:14px; width:16px; text-align:center; flex-shrink:0;}
  .nav-item .lbl{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .nav-item:hover{background:var(--bg-hover);}
  .nav-item.active{background:var(--bg-hover); color:var(--text); font-weight:600;}
  .nav-add{margin:8px 8px 12px; padding:5px 8px; border:none; text-align:left; font-size:13px; color:var(--text-faint); cursor:pointer; background:none;}
  .nav-add:hover{color:var(--blue);}
  .sidebar-foot{padding:10px 14px 14px; border-top:1px solid var(--border); font-size:10.5px; color:var(--text-faint); line-height:1.6;}
  .sidebar-foot a{color:var(--text-faint);}

  @media (min-width:900px){ .hamburger{display:none;} .scrim{display:none;}
    .sidebar{position:sticky; transform:none; width:230px; max-width:230px; height:calc(100vh - 46px); background:var(--bg);} }

  .main{flex:1; min-width:0; padding:0 18px 100px;}
  @media (min-width:900px){ .main{padding:0 0 100px;} }
  .doc{max-width:760px; margin:0 auto; padding-top:28px;}
  @media (min-width:900px){ .doc{padding-top:60px;} }

  .crumbs{font-size:12px; color:var(--text-faint); margin-bottom:10px;}
  .crumbs a{color:var(--text-faint); text-decoration:none;}
  .crumbs a:hover{text-decoration:underline;}
  .page-icon{font-size:52px; line-height:1; margin-bottom:6px;}
  .page-icon[contenteditable]{cursor:text; display:inline-block;}
  h1.page-title{font-size:clamp(26px,5vw,34px); font-weight:800; margin:0 0 6px; line-height:1.2;}
  h1.page-title[contenteditable]:focus{outline:none; background:var(--bg-hover); border-radius:3px;}
  .date-input{font-family:var(--font-mono); font-size:12.5px; border:none; background:none; color:var(--text-faint); padding:0; margin-bottom:22px; display:block; border-bottom:1px dotted transparent;}
  .date-input:hover{border-bottom-color:var(--border);}
  .date-input:focus{outline:none; color:var(--text); border-bottom:1px solid var(--blue);}

  .props-row{display:flex; flex-wrap:wrap; gap:22px; padding:14px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin-bottom:26px;}
  .props-row .prop .l{font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint); margin-bottom:2px;}
  .props-row .prop .v{font-family:var(--font-mono); font-size:15px; font-weight:600;}

  h2.section-h{font-size:18px; font-weight:700; margin:34px 0 10px; display:flex; align-items:center; gap:8px;}
  h2.section-h:first-of-type{margin-top:8px;}
  p.section-hint{font-size:12.5px; color:var(--text-faint); margin:-4px 0 12px;}

  .pagelink-row{display:flex; align-items:center; gap:10px; padding:9px 6px; border-bottom:1px solid var(--border); cursor:pointer; border-radius:4px;}
  .pagelink-row:hover{background:var(--bg-hover);}
  .pagelink-row .ic{font-size:18px; flex-shrink:0; width:24px; text-align:center;}
  .pagelink-row .t{font-weight:500; flex:1;}
  .pagelink-row .d{font-family:var(--font-mono); font-size:12px; color:var(--text-faint);}
  .pagelink-row .arrow{color:var(--text-faint); font-size:13px;}

  .callout{background:var(--bg-callout-blue); border-radius:4px; padding:14px 16px; margin:20px 0; display:flex; gap:12px;}
  .callout .ic{font-size:20px; flex-shrink:0;}
  .callout .body{flex:1; min-width:0;}
  .callout-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px 18px;}
  @media (max-width:480px){ .callout-grid{grid-template-columns:1fr;} }
  .kv{display:flex; flex-direction:column;}
  .kv label{font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.04em;}
  .kv input{border:none; border-bottom:1px solid transparent; background:transparent; color:var(--text); font-size:13.5px; padding:2px 0;}
  .kv input:hover{border-bottom-color:var(--border);}
  .kv input:focus{outline:none; border-bottom-color:var(--blue);}

  .db-table{width:100%; border-collapse:collapse; margin-bottom:6px; font-size:13.5px;}
  .db-table thead th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint); font-weight:600; padding:6px 8px; border-bottom:1px solid var(--border);}
  .day-row td{padding:0; border:none;}
  .day-hd{display:flex; align-items:center; gap:8px; padding:16px 6px 6px; cursor:pointer; user-select:none;}
  .day-hd .chev{font-size:10px; color:var(--text-faint); transition:transform .15s; width:12px;}
  .day-group.collapsed .chev{transform:rotate(-90deg);}
  .day-hd input.day-title{font-weight:700; font-size:14px; border:none; background:transparent; padding:1px 3px; border-radius:3px; color:var(--text); min-width:56px;}
  .day-hd input.day-title:focus{outline:none; background:var(--bg-hover);}
  .day-hd input.day-date{font-family:var(--font-mono); font-size:11.5px; color:var(--text-faint); border:none; background:transparent; width:82px; padding:1px 3px; border-radius:3px;}
  .day-hd input.day-date:focus{outline:none; background:var(--bg-hover);}
  .day-hd input.day-route{flex:1; min-width:80px; font-size:12.5px; color:var(--text-faint); border:none; background:transparent; padding:1px 3px; border-radius:3px;}
  .day-hd input.day-route:focus{outline:none; background:var(--bg-hover);}
  .day-hd .count{font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint);}
  .day-hd .day-del{background:none; border:none; color:var(--text-faint); cursor:pointer; font-size:13px; padding:3px 5px; opacity:0;}
  .day-hd:hover .day-del{opacity:1;}
  .day-hd .day-del:hover{color:var(--red);}
  .day-group.long .day-hd input.day-title{color:var(--red);}
  .item-tr td{border-bottom:1px solid var(--border); padding:0;}
  .item-tr{transition:background .1s;}
  .item-tr:hover td{background:var(--bg-hover);}
  .cell-icon{width:30px;}
  .cell-icon input{width:26px; text-align:center; font-size:15px; border:none; background:transparent; padding:6px 0;}
  .cell-action{width:88px;}
  .cell-action input{width:100%; font-weight:600; font-size:12px; color:var(--text-light); border:none; background:transparent; padding:6px 4px;}
  .cell-place input{width:100%; font-size:13.5px; border:none; background:transparent; padding:6px 4px;}
  .cell-note input{width:100%; font-size:12.5px; color:var(--text-light); border:none; background:transparent; padding:6px 4px;}
  .cell-del{width:26px;}
  .cell-del button{background:none; border:none; color:var(--text-faint); cursor:pointer; font-size:13px; padding:4px; opacity:0;}
  .item-tr:hover .cell-del button{opacity:1;}
  .cell-del button:hover{color:var(--red);}
  td input:focus{outline:none; background:var(--bg-hover); border-radius:3px;}
  .add-item-row td{padding:6px 4px;}
  .add-item-btn{background:none; border:none; color:var(--text-faint); font-size:12.5px; cursor:pointer; padding:4px 4px;}
  .add-item-btn:hover{color:var(--blue);}
  .add-day-btn{display:block; width:100%; text-align:left; padding:12px 6px; border:none; border-top:1px dashed var(--border); background:none; color:var(--text-faint); font-size:13.5px; cursor:pointer; margin-top:8px;}
  .add-day-btn:hover{color:var(--blue);}

  .doc-section{margin-bottom:8px;}
  textarea.field{width:100%; border:none; border-left:2px solid var(--border); padding:2px 0 2px 12px; background:transparent; color:var(--text); resize:vertical; min-height:60px; line-height:1.6; font-size:14px;}
  textarea.field:focus{outline:none; border-left-color:var(--blue);}
  textarea.journal{min-height:130px;}

  .photo-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:8px; margin-top:10px;}
  .photo-thumb{position:relative; border-radius:4px; overflow:hidden; aspect-ratio:1; background:var(--bg-hover);}
  .photo-thumb img{width:100%; height:100%; object-fit:cover; cursor:pointer; display:block;}
  .photo-thumb .rm{position:absolute; top:4px; right:4px; background:rgba(30,30,30,.65); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:12px; cursor:pointer;}
  .photo-thumb.loading{display:flex; align-items:center; justify-content:center; color:var(--text-faint); font-size:10.5px;}
  .upload-btn{display:inline-flex; align-items:center; gap:6px; background:none; border:1px dashed var(--border); border-radius:4px; padding:7px 11px; font-size:12.5px; color:var(--text-light); cursor:pointer; margin-top:10px;}
  .upload-btn:hover{border-color:var(--blue); color:var(--blue);}
  .upload-btn input{display:none;}

  .doc-row{display:flex; align-items:center; gap:9px; padding:7px 4px; border-bottom:1px solid var(--border);}
  .doc-row .di{font-size:15px; flex-shrink:0;}
  .doc-row .dn{flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .doc-row .dsz{font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint); flex-shrink:0;}
  .doc-row button{background:none; border:none; cursor:pointer; font-size:14px; padding:3px 5px; flex-shrink:0;}
  .doc-row .open{color:var(--text-light);}
  .doc-row .rm{color:var(--red);}

  .lightbox{position:fixed; inset:0; background:rgba(15,15,15,.9); z-index:60; display:none; align-items:center; justify-content:center; padding:20px;}
  .lightbox.show{display:flex;}
  .lightbox img{max-width:100%; max-height:88vh; border-radius:4px;}
  .lightbox .close{position:absolute; top:16px; right:18px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer;}

  .toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:#fff; padding:7px 14px; border-radius:4px; font-size:12px; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:70;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .danger-zone{border-top:1px solid var(--border); padding-top:16px; margin-top:30px;}
  .danger-zone h2{color:var(--red);}

  .modal-back{position:fixed; inset:0; background:rgba(15,15,15,.45); z-index:50; display:none; align-items:center; justify-content:center; padding:20px;}
  .modal-back.show{display:flex;}
  .modal{background:var(--bg); border-radius:6px; padding:20px; max-width:340px; width:100%; box-shadow:0 4px 20px rgba(0,0,0,.15);}
  .modal h3{font-size:15px; font-weight:700; margin:0 0 12px;}
  .modal input{width:100%; padding:8px 0; border:none; border-bottom:1px solid var(--border); margin-bottom:14px; background:none; font-size:14px;}
  .modal input:focus{outline:none; border-bottom-color:var(--blue);}
  .modal .row{display:flex; gap:10px;}
  .modal .row .btn{flex:1;}
  .empty-msg{color:var(--text-faint); font-size:12.5px; padding:6px 0;}
</style>
</head>
<body>

<div id="boot"><div class="spinner"></div><div class="mark">Jurnal de Călătorie</div><div class="sub">Se încarcă...</div></div>

<div id="app">
  <div class="topbar">
    <button class="hamburger" onclick="toggleDrawer(true)">☰</button>
    <div class="title" id="topTitle">Jurnal de Călătorie</div>
    <div class="save-dot" id="saveDot"></div>
  </div>
  <div class="shell">
    <div class="scrim" id="scrim" onclick="toggleDrawer(false)"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">🗺️ Cluj → Adriatica</div>
      <ul class="nav-list" id="navList"></ul>
      <button class="nav-add" onclick="openAddPageModal()">+ Adaugă pagină</button>
      <div class="sidebar-foot">
        Jurnal comun — vizibil și editabil de oricine are linkul.<br>
        <a href="#" onclick="exportAll();return false;">Backup JSON</a>
      </div>
    </div>
    <div class="main"><div class="doc" id="pageContent"></div></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" onclick="event.stopPropagation()">
</div>
<div class="modal-back" id="modalBack"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast">✓ Salvat</div>

<script>
/* ============================================================
   API HELPERS (server-backed: Netlify Blobs) - FARA PIN
   ============================================================ */
async function apiGet(key){
  try{
    const r = await fetch('/api/kv?key='+encodeURIComponent(key));
    if(!r.ok) return null;
    const d = await r.json();
    return d.value;
  }catch(e){ return null; }
}
async function apiSet(key, value){
  try{
    const r = await fetch('/api/kv', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key, value})
    });
    return r.ok;
  }catch(e){ return false; }
}
async function apiDel(key){
  try{ await fetch('/api/kv?key='+encodeURIComponent(key), { method:'DELETE' }); }catch(e){}
}
function safeParse(str, fb){ try{ return JSON.parse(str); }catch(e){ return fb; } }

/* ============================================================
   DEFAULT DATA
   ============================================================ */

function mk(icon, action, place, note){ return {id:'i'+Math.random().toString(36).slice(2,9), icon, action, place, note}; }

const DEFAULT_ITINERARY = [

function flashSaving(){ document.getElementById('saveDot').classList.add('saving'); }
function flashSaved(ok=true){
  document.getElementById('saveDot').classList.remove('saving');
  const t = document.getElementById('toast');
  t.textContent = ok ? '✓ Salvat' : '⚠ Eroare la salvare';
  t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 1300);
}
function debounce(fn, ms){ let h; return (...a)=>{ clearTimeout(h); flashSaving(); h=setTimeout(()=>fn(...a),ms); }; }
const persistItinerary = debounce(async ()=>{ const ok = await apiSet('itinerary_v2', JSON.stringify(itinerary)); flashSaved(ok); }, 600);
async function persistPagesList(){ flashSaving(); const ok = await apiSet('pages_list', JSON.stringify(pagesList)); flashSaved(ok); }
function persistPageFactory(slug){ return debounce(async ()=>{ const ok = await apiSet('page:'+slug, JSON.stringify(pagesCache[slug])); flashSaved(ok); }, 600); }

      <tr class="day-row"><td colspan="5">
        <div class="day-hd" onclick="toggleDayCollapse('${day.id}', event)">

          <input class="day-date" value="${escAttr(day.date)}" oninput="updateDay('${day.id}','date',this.value)" onclick="event.stopPropagation()">

        </div>
      </td></tr>`;

      html += `<tr class="item-tr">
        <td class="cell-icon"><input value="${escAttr(item.icon)}" oninput="updateItem('${day.id}','${item.id}','icon',this.value)"></td>
        <td class="cell-action"><input value="${escAttr(item.action)}" oninput="updateItem('${day.id}','${item.id}','action',this.value)"></td>
        <td class="cell-place"><input value="${escAttr(item.place)}" oninput="updateItem('${day.id}','${item.id}','place',this.value)"></td>

        <td class="cell-del"><button onclick="deleteItem('${day.id}','${item.id}')">×</button></td>
      </tr>`;
    });
    html += `<tr class="add-item-row"><td colspan="5"><button class="add-item-btn" onclick="addItem('${day.id}')">+ Adaugă element</button></td></tr>
    </tbody>`;
  });

function applyCollapseStates(){
  document.querySelectorAll('.day-group').forEach(tbody=>{

async function getPage(slug){
  if(pagesCache[slug]) return pagesCache[slug];
  const raw = await apiGet('page:'+slug);
  let page = raw ? safeParse(raw, null) : null;
  if(!page){
    const d = DEFAULT_PAGE_CONTENT[slug] || {countries:'',restrictions:'',events:'',journal:''};
    page = {slug, countries:d.countries||'', restrictions:d.restrictions||'', events:d.events||'', journal:d.journal||'', photos:[], docs:[]};
    await apiSet('page:'+slug, JSON.stringify(page));
  }
  if(!page.photos) page.photos = [];
  if(!page.docs) page.docs = [];
  pagesCache[slug] = page;
  return page;
}

/* ---------- Photos (real files via Vercel Blob) ---------- */
function resizeImageFile(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const img=new Image(), reader=new FileReader();
    reader.onload=e=>{ img.src=e.target.result; };
    reader.onerror=reject;
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxDim||h>maxDim){ if(w>h){h=Math.round(h*maxDim/w);w=maxDim;} else {w=Math.round(w*maxDim/h);h=maxDim;} }
      const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror=reject; reader.readAsDataURL(file);
  });
}
async function uploadFile(name, dataUrl, contentType){
  const base64 = dataUrl.split(',')[1];
  const r = await fetch('/api/files', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, dataBase64:base64, contentType})
  });
  if(!r.ok){ const e = await r.json().catch(()=>({error:'necunoscută'})); throw new Error(e.error||'eroare upload'); }
  const { id } = await r.json();
  return '/api/files?id='+id;
}
async function deleteFileByUrl(url){
  const id = new URL(url, window.location.origin).searchParams.get('id');
  if(!id) return;
  fetch('/api/files', {method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})}).catch(()=>{});
}
async function onPhotoSelected(slug, input){
  const file = input.files[0]; if(!file) return; input.value='';
  const grid = document.getElementById('photoGrid-'+slug);
  const temp = document.createElement('div'); temp.className='photo-thumb loading'; temp.textContent='...';
  grid.appendChild(temp);
  try{
    const dataUrl = await resizeImageFile(file, 1600, 0.75);
    if(dataUrl.length*0.75 > 4*1024*1024){ alert('Poza rămâne prea mare.'); temp.remove(); return; }
    const url = await uploadFile(file.name, dataUrl, 'image/jpeg');
    const page = pagesCache[slug];
    page.photos.push({id:'p'+Date.now(), name:file.name, url});
    const ok = await apiSet('page:'+slug, JSON.stringify(page));
    flashSaved(ok);
    renderPhotoGrid(slug);
  }catch(e){ alert('Eroare la încărcarea pozei: '+e.message); temp.remove(); }
}
function renderPhotoGrid(slug){
  const page = pagesCache[slug]; const grid = document.getElementById('photoGrid-'+slug); if(!grid) return;
  if(!page.photos.length){ grid.innerHTML='<div class="empty-msg">Nicio poză încă.</div>'; return; }
  grid.innerHTML='';
  page.photos.forEach(ph=>{
    const div=document.createElement('div'); div.className='photo-thumb';
    div.innerHTML = `<img src="${ph.url}" onclick="openLightbox('${ph.url.replace(/'/g,"\\'")}')"><button class="rm" onclick="removePhoto('${slug}','${ph.id}',event)">×</button>`;
    grid.appendChild(div);
  });
}
async function removePhoto(slug, id, ev){
  if(ev) ev.stopPropagation();
  if(!confirm('Ștergi această poză?')) return;
  const page = pagesCache[slug];
  const ph = page.photos.find(p=>p.id===id);
  page.photos = page.photos.filter(p=>p.id!==id);
  await apiSet('page:'+slug, JSON.stringify(page));
  if(ph) deleteFileByUrl(ph.url);
  flashSaved(true);
  renderPhotoGrid(slug);
}
function openLightbox(url){ document.getElementById('lightboxImg').src=url; document.getElementById('lightbox').classList.add('show'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('show'); }

/* ---------- Documents ---------- */
async function onDocSelected(slug, input){
  const file = input.files[0]; if(!file) return; input.value='';
  if(file.size > 4*1024*1024){ alert('Fișierul depășește limita (~4MB pe planul gratuit).'); return; }
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const dataUrl = e.target.result;
      const url = await uploadFile(file.name, dataUrl, file.type||'application/octet-stream');
      const page = pagesCache[slug];
      page.docs.push({id:'d'+Date.now(), name:file.name, url, size:file.size});
      const ok = await apiSet('page:'+slug, JSON.stringify(page));
      flashSaved(ok);
      renderDocList(slug);
    }catch(err){ alert('Eroare la încărcarea documentului: '+err.message); }
  };
  reader.readAsDataURL(file);
}
function renderDocList(slug){
  const page = pagesCache[slug]; const box = document.getElementById('docList-'+slug); if(!box) return;
  if(!page.docs.length){ box.innerHTML='<div class="empty-msg">Niciun document încă.</div>'; return; }
  box.innerHTML='';
  page.docs.forEach(d=>{
    const kb = d.size ? Math.round(d.size/1024)+' KB' : '';
    const row = document.createElement('div'); row.className='doc-row';
    row.innerHTML = `<span class="di">${d.name.toLowerCase().endsWith('.pdf')?'📄':'🖼️'}</span>
      <span class="dn">${escapeHtml(d.name)}</span><span class="dsz">${kb}</span>
      <a class="open" href="${d.url}" target="_blank" title="Deschide">👁</a>
      <button class="rm" onclick="removeDoc('${slug}','${d.id}')" title="Șterge">🗑</button>`;
    box.appendChild(row);
  });
}
async function removeDoc(slug, id){
  if(!confirm('Ștergi acest document?')) return;
  const page = pagesCache[slug];
  const d = page.docs.find(x=>x.id===id);
  page.docs = page.docs.filter(x=>x.id!==id);
  await apiSet('page:'+slug, JSON.stringify(page));
  if(d) deleteFileByUrl(d.url);
  flashSaved(true);
  renderDocList(slug);
}

    <input id="newPageDates" placeholder="Perioadă (ex: 23–24.07)">
    <div class="row"><button class="btn btn-ghost" onclick="closeModal()">Anulează</button>
      <button class="btn btn-primary" onclick="confirmAddPage()">Adaugă</button></div>`;
  document.getElementById('modalBack').classList.add('show');
  setTimeout(()=>document.getElementById('newPageTitle').focus(),50);
}
async function confirmAddPage(){
  const title = document.getElementById('newPageTitle').value.trim();
  const dates = document.getElementById('newPageDates').value.trim();
  if(!title) return;
  let slug = slugify(title), n=1;
  while(pagesList.find(p=>p.slug===slug)){ slug = slugify(title)+'-'+(++n); }
  pagesList.push({slug, title, icon:'📍', dates});
  await persistPagesList();
  const page = {slug, countries:'', restrictions:'', events:'', journal:'', photos:[], docs:[]};
  pagesCache[slug] = page;
  await apiSet('page:'+slug, JSON.stringify(page));
  closeModal(); renderNav(); goToPage(slug);
}
function closeModal(){ document.getElementById('modalBack').classList.remove('show'); }
async function deleteCurrentPage(slug){
  const p = pagesList.find(x=>x.slug===slug);
  if(!confirm(`Ștergi definitiv pagina "${p?p.title:slug}" și tot conținutul ei? Nu se poate anula.`)) return;
  const page = await getPage(slug);
  for(const ph of page.photos) deleteFileByUrl(ph.url);
  for(const d of page.docs) deleteFileByUrl(d.url);
  await apiDel('page:'+slug);
  pagesList = pagesList.filter(x=>x.slug!==slug);
  delete pagesCache[slug];
  await persistPagesList();
  renderNav(); goToPage('itinerary');
}

/* ============================================================
   EXPORT
   ============================================================ */
async function exportAll(){
  const allPages = {};
  for(const p of pagesList){ if(p.slug==='itinerary') continue; allPages[p.slug] = await getPage(p.slug); }
  const bundle = {exportedAt:new Date().toISOString(), pagesList, itinerary, pages:allPages};
  const blob = new Blob([JSON.stringify(bundle,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='jurnal-calatorie-backup.json';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

/* ============================================================
   UTILS
   ============================================================ */
function slugify(str){ return (str||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,30)||'pagina'; }
function escapeHtml(str){ return (str||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escAttr(str){ return escapeHtml(str).replace(/\n/g,' '); }
</script>
